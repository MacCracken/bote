[package]
name = "bote"
version = "2.5.1"
description = "MCP core service in Cyrius — stable 2.x. JSON-RPC 2.0, six transports, bearer auth + JWT HS256 + RFC 7636 PKCE, libro audit tools, content blocks (with annotations), host registry + IPv4/IPv6 SSRF guard, pluggable sandbox runner (kavach 3.0)"
license = "GPL-3.0-only"
language = "cyrius"
cyrius = "4.8.4"

[build]
entry = "src/main.cyr"
output = "bote"

[deps]
stdlib = ["alloc", "args", "base64", "chrono", "fmt", "fnptr", "hashmap", "http_server", "io", "json", "net", "str", "string", "syscalls", "tagged", "vec"]

[deps.libro]
git = "https://github.com/MacCracken/libro"
path = "../libro"
tag = "1.0.3"
modules = ["src/error.cyr", "src/hasher.cyr", "src/entry.cyr", "src/verify.cyr", "src/query.cyr", "src/retention.cyr", "src/chain.cyr", "src/export.cyr", "src/merkle.cyr"]

[deps.majra]
git = "https://github.com/MacCracken/majra"
path = "../majra"
tag = "2.2.0"
modules = ["src/error.cyr", "src/counter.cyr", "src/envelope.cyr", "src/namespace.cyr", "src/queue.cyr", "src/pubsub.cyr"]
