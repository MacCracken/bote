[package]
name = "bote"
version = "1.0.1"
description = "MCP core service in Cyrius — JSON-RPC 2.0, registry, dispatch, three transports"
license = "GPL-3.0-only"
language = "cyrius"
cyrius = "4.4.4"

[build]
entry = "src/main.cyr"
output = "bote"

[deps]
stdlib = ["alloc", "args", "chrono", "fmt", "fnptr", "hashmap", "io", "json", "net", "str", "string", "syscalls", "tagged", "vec"]
