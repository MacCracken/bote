name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # `cyrius deps` populates ./lib/ from the version-pinned snapshot,
  # which then shadows the global ~/.cyrius/versions/<V>/lib/ snapshot
  # on every subsequent `cyrius build` invocation. That's intentional
  # (the cwd lib IS the version-pinned content cyrius deps just
  # copied), but cyrius emits an informational note about it on
  # every build. Silence it across all CI steps. Same pattern as
  # majra / libro / agnosys CI post-5.10.x.
  CYRIUS_NO_WARN_SHADOW_LIB: "1"

  # Whole-program dead-code elimination — keeps the binary lean
  # and matches the first-party convention (agnosys / agnostik /
  # majra / libro).
  CYRIUS_DCE: "1"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # The cyrius.cyml `[package].cyrius` pin is the single source of
        # truth for the toolchain version — nothing is hardcoded in this
        # YAML. Hand the pin to the upstream installer, which fetches +
        # lays out $HOME/.cyrius/{bin,lib}: binaries (cycc / cyrius /
        # cyrfmt / cyrlint ...) plus the stdlib snapshot, walking nested
        # lib/ subdirs. Replaces the hand-rolled two-tarball extraction
        # used through 2.7.2 — that path probed for `bin/cc5`, which the
        # 6.x toolchain renamed to `cycc`, breaking the install gate.
        # Same installer body as patra / agnosys on the 6.x toolchain.
        run: |
          set -e
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: cyrius --version

      - name: Resolve dependencies
        # Populates ./lib/ from the version-pinned stdlib snapshot
        # plus [deps.libro] / [deps.majra] dist bundles at their
        # tagged versions. ./lib/ is gitignored — first-party
        # convention across agnosys / majra / libro / yukti / patra.
        run: cyrius deps

      - name: Verify dep hashes
        # Skip on the first push that introduces a new dep before
        # cyrius.lock has been generated and committed. After it
        # lands in-tree, this step starts enforcing hash match.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Manifest completeness ([lib] modules ⊇ main.cyr src/ includes)
        run: |
          # Every `include "src/<file>.cyr"` in src/main.cyr must be
          # listed under cyrius.cyml [lib] modules OR be in the
          # known-excluded set below. Otherwise `cyrius distlib`
          # silently ships a bundle missing a module. Mirrors
          # libro / majra.
          #
          # Excluded — entry-only helpers that belong to the binary,
          # not the public library surface. Including them in [lib]
          # modules would publish internal CLI / dispatcher-setup
          # helpers into dist/bote.cyr where consumers don't want
          # them.
          EXCLUDES=$(printf '%s\n' \
            "src/main_common.cyr" \
            | sort -u)
          INCLUDES=$(grep -E 'include "src/[^"]+\.cyr"' src/main.cyr \
            | grep -v "^#" \
            | sed -E 's/.*"(src\/[^"]+\.cyr)".*/\1/' | sort -u)
          MANIFEST=$(awk '/^\[lib\]/{flag=1;next} /^\[/{flag=0} flag' cyrius.cyml \
            | grep -oE '"src/[^"]+\.cyr"' | tr -d '"' | sort -u)
          REQUIRED=$(comm -23 <(echo "$INCLUDES") <(echo "$EXCLUDES"))
          MISSING=$(comm -23 <(echo "$REQUIRED") <(echo "$MANIFEST"))
          if [ -n "$MISSING" ]; then
            echo "FAIL: src/ files included from main.cyr but not in cyrius.cyml [lib] modules:"
            echo "$MISSING"
            echo
            echo "If this is a new entry-only helper (like main_common.cyr),"
            echo "add it to EXCLUDES above. Otherwise add it to [lib] modules."
            exit 1
          fi
          echo "Manifest covers all main.cyr src/ includes."
          echo "Excluded (entry-only): $(echo "$EXCLUDES" | tr '\n' ' ')"

      - name: Build
        run: |
          mkdir -p build
          # CYRIUS_STATS=1 emits a machine-parseable capacity report
          # at the tail of stdout — feeds the capacity gate below.
          CYRIUS_STATS=1 cyrius build src/main.cyr build/bote 2>&1 | tee build/build.log
          echo "bote: $(wc -c < build/bote) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/bote | grep -q "7f45 4c46"

      - name: Capacity gate
        # Compile-time resource gate. Cyrius prints utilisation under
        # `cyrius stats:` when CYRIUS_STATS=1 (see the build step).
        # We fail CI if fn_table or identifiers cross 95% — the cyrius
        # compiler itself warns at 85%, but the warning isn't load-bearing
        # so something has to enforce. 95% leaves ~5% headroom for a
        # mid-PR feature add before forcing the split conversation.
        #
        # If this gate fires, the response is one of:
        #   1. Land the cyrius cap raise upstream (preferred; the cap
        #      has moved before — 2048→4096 in cyrius 4.7.1).
        #   2. Split a transport into an opt-in compile unit (e.g.
        #      keep stdio + http in the default binary; ws / streamable
        #      / bridge pulled in via separate `include "src/transport_ws.cyr"`
        #      at the consumer's main.cyr).
        #   3. Feature-gate the unused config-setter surface behind
        #      `#ifdef BOTE_FULL_CONFIG` so the lean profile sheds
        #      ~30 setters that no in-tree consumer calls.
        # Inspect locally with `CYRIUS_STATS=1 cyrius build src/main.cyr
        # build/bote` — the `cyrius stats:` block at the tail of stdout
        # shows current utilisation.
        run: |
          if ! grep -q "^cyrius stats:" build/build.log; then
            echo "::warning::cyrius stats: line not found — CYRIUS_STATS may be unsupported on this toolchain. Skipping gate."
            exit 0
          fi
          fn_used=$(grep "^  fn_table:" build/build.log    | awk '{print $2}')
          fn_cap=$(grep  "^  fn_table:" build/build.log    | awk '{print $4}')
          id_used=$(grep "^  identifiers:" build/build.log | awk '{print $2}')
          id_cap=$(grep  "^  identifiers:" build/build.log | awk '{print $4}')
          fn_pct=$(( fn_used * 100 / fn_cap ))
          id_pct=$(( id_used * 100 / id_cap ))
          echo "fn_table:    $fn_used / $fn_cap  (${fn_pct}%)"
          echo "identifiers: $id_used / $id_cap  (${id_pct}%)"
          fail=0
          if [ "$fn_pct" -ge 95 ]; then
            echo "::error::fn_table at ${fn_pct}% — split / cap-raise required (gate threshold 95%)"
            fail=1
          fi
          if [ "$id_pct" -ge 95 ]; then
            echo "::error::identifier buffer at ${id_pct}% — split / cap-raise required (gate threshold 95%)"
            fail=1
          fi
          exit $fail

      - name: dist bundles are up-to-date
        # `cyrius distlib` reads cyrius.cyml [lib] / [lib.<profile>]
        # modules and emits dist/bote.cyr (default, full bundle) and
        # dist/bote-core.cyr (opt-in core profile, 2.7.2+)
        # deterministically. Both committed bundles must match the
        # regenerated bundles byte-for-byte; otherwise a downstream
        # consumer cloning at our tag gets stale code under
        # `cyrius deps`. Mirrors libro / majra freshness gate.
        # cyrius emits an informational note about unresolved symbols
        # in consumer-included bundles (expected — stdlib is supplied
        # by the consumer); the bundle is still emitted, we only fail
        # on a stale diff.
        run: |
          fail=0
          cyrius distlib || true
          test -s dist/bote.cyr || { echo "FAIL: dist/bote.cyr not produced"; exit 1; }
          if ! git diff --exit-code dist/bote.cyr; then
            echo "FAIL: dist/bote.cyr is stale. Run 'cyrius distlib' and commit."
            fail=1
          else
            echo "dist/bote.cyr matches src/ ($(wc -l < dist/bote.cyr) lines)"
          fi
          cyrius distlib core || true
          test -s dist/bote-core.cyr || { echo "FAIL: dist/bote-core.cyr not produced"; exit 1; }
          if ! git diff --exit-code dist/bote-core.cyr; then
            echo "FAIL: dist/bote-core.cyr is stale. Run 'cyrius distlib core' and commit."
            fail=1
          else
            echo "dist/bote-core.cyr matches src/ ($(wc -l < dist/bote-core.cyr) lines)"
          fi
          exit $fail

      - name: Run tests
        # Test files split across compilation units (bote.tcyr, plus
        # per-module bote_<mod>.tcyr) to stay under the cyrius
        # function-table cap. Run each in turn; fail fast on any
        # 'N failed' line that isn't '0 failed'.
        run: |
          fail=0
          for tcyr in tests/bote.tcyr \
                      tests/bote_auth.tcyr \
                      tests/bote_content.tcyr \
                      tests/bote_host.tcyr \
                      tests/bote_jwt.tcyr \
                      tests/bote_pkce.tcyr \
                      tests/bote_sandbox.tcyr \
                      tests/bote_libro_tools.tcyr \
                      tests/bote_streamable.tcyr \
                      tests/bote_ws.tcyr \
                      tests/bote_core_only_smoke.tcyr; do
            echo "--- $tcyr ---"
            out=$(cyrius test "$tcyr" 2>&1)
            tail=$(echo "$out" | tail -3)
            echo "$tail"
            if echo "$out" | grep -qE '^[0-9]+ passed, [^0]'; then
              echo "FAIL: $tcyr"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || exit 1

      - name: Build benchmarks (non-fatal)
        run: |
          if [ -f tests/bote.bcyr ]; then
            cyrius build tests/bote.bcyr build/bote_bench || exit 0
            ./build/bote_bench | tee bench-results.txt || exit 0
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bote-${{ github.sha }}
          path: |
            build/bote
            bench-results.txt
          if-no-files-found: warn

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md CLAUDE.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md LICENSE VERSION cyrius.cyml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          CYML_VERSION=$(grep '^version = ' cyrius.cyml | head -1 | sed -E 's/version = "([^"]+)".*/\1/')
          # cyrius.cyml uses ${file:VERSION} — treat the literal as "match"
          if [ "$CYML_VERSION" != '${file:VERSION}' ] && [ "$CYML_VERSION" != "$FILE_VERSION" ]; then
            echo "FAIL: VERSION ($FILE_VERSION) != cyrius.cyml ($CYML_VERSION)"
            exit 1
          fi
          grep -q "\[$FILE_VERSION\]" CHANGELOG.md || { echo "FAIL: version $FILE_VERSION not in CHANGELOG.md"; exit 1; }
          echo "Version consistent: $FILE_VERSION"
