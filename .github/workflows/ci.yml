name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # `cyrius deps` populates ./lib/ from the version-pinned snapshot,
  # which then shadows the global ~/.cyrius/versions/<V>/lib/ snapshot
  # on every subsequent `cyrius build` invocation. That's intentional
  # (the cwd lib IS the version-pinned content cyrius deps just
  # copied), but cyrius emits an informational note about it on
  # every build. Silence it across all CI steps. Same pattern as
  # majra / libro / agnosys CI post-5.10.x.
  CYRIUS_NO_WARN_SHADOW_LIB: "1"

  # Whole-program dead-code elimination — keeps the binary lean
  # and matches the first-party convention (agnosys / agnostik /
  # majra / libro).
  CYRIUS_DCE: "1"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Version-pinned layout — cc5 5.10.9+ resolves arch-peer
        # includes (syscalls_x86_64_linux.cyr etc.) under
        # ~/.cyrius/versions/<V>/lib/. The 5.10.x release tarball
        # ships bin/ + deps/ only — the lib/ stdlib snapshot is NOT
        # in the tarball — so we also pull the GitHub source archive
        # at the version tag and copy lib/ from there. Same installer
        # body as majra / libro / agnosys.
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -E '^cyrius[[:space:]]*=' cyrius.cyml | sed -E 's/^cyrius[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"

          # Release tarball — binaries + first-party deps cache
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"

          # Source archive — stdlib (lib/) snapshot at the version tag
          curl -sL "https://github.com/MacCracken/cyrius/archive/refs/tags/$CYRIUS_VERSION.tar.gz" -o cyrius-src.tar.gz
          tar xzf cyrius-src.tar.gz
          CYRIUS_SRC="cyrius-$CYRIUS_VERSION"

          VERSIONED="$HOME/.cyrius/versions/$CYRIUS_VERSION"
          mkdir -p "$VERSIONED/bin" "$VERSIONED/lib"
          cp "$CYRIUS_DIR/bin/"* "$VERSIONED/bin/" 2>/dev/null || true
          cp "$CYRIUS_DIR/scripts/cyrius" "$VERSIONED/bin/cyrius" 2>/dev/null || true
          cp -r "$CYRIUS_SRC/lib/"* "$VERSIONED/lib/"
          # Carry the prebuilt deps snapshot so `cyrius deps` doesn't
          # have to git-clone the first-party tree on every CI run.
          if [ -d "$CYRIUS_DIR/deps" ]; then
            mkdir -p "$HOME/.cyrius/deps"
            cp -r "$CYRIUS_DIR/deps/"* "$HOME/.cyrius/deps/"
          fi
          chmod +x "$VERSIONED/bin/"* 2>/dev/null || true
          ln -sfn "$VERSIONED/bin" "$HOME/.cyrius/bin"
          ln -sfn "$VERSIONED/lib" "$HOME/.cyrius/lib"
          echo "$CYRIUS_VERSION" > "$HOME/.cyrius/current"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

          # Sanity check
          test -f "$VERSIONED/lib/syscalls_x86_64_linux.cyr" || { echo "FAIL: stdlib lib/syscalls_x86_64_linux.cyr missing — source archive extraction failed"; exit 1; }
          test -x "$VERSIONED/bin/cc5" || { echo "FAIL: bin/cc5 missing — release tarball extraction failed"; exit 1; }
          echo "OK: stdlib + binaries installed under $VERSIONED"

      - name: Verify toolchain
        run: cc5 --version

      - name: Resolve dependencies
        # Populates ./lib/ from the version-pinned stdlib snapshot
        # plus [deps.libro] / [deps.majra] dist bundles at their
        # tagged versions. ./lib/ is gitignored — first-party
        # convention across agnosys / majra / libro / yukti / patra.
        run: cyrius deps

      - name: Verify dep hashes
        # Skip on the first push that introduces a new dep before
        # cyrius.lock has been generated and committed. After it
        # lands in-tree, this step starts enforcing hash match.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Manifest completeness ([lib] modules ⊇ main.cyr src/ includes)
        run: |
          # Every `include "src/<file>.cyr"` in src/main.cyr must be
          # listed under cyrius.cyml [lib] modules (or be in the
          # known-excluded set). Otherwise `cyrius distlib` silently
          # ships a bundle missing a module. Mirrors libro / majra.
          INCLUDES=$(grep -E 'include "src/[^"]+\.cyr"' src/main.cyr \
            | grep -v "^#" \
            | sed -E 's/.*"(src\/[^"]+\.cyr)".*/\1/' | sort -u)
          MANIFEST=$(awk '/^\[lib\]/{flag=1;next} /^\[/{flag=0} flag' cyrius.cyml \
            | grep -oE '"src/[^"]+\.cyr"' | tr -d '"' | sort -u)
          MISSING=$(comm -23 <(echo "$INCLUDES") <(echo "$MANIFEST"))
          if [ -n "$MISSING" ]; then
            echo "FAIL: src/ files included from main.cyr but not in cyrius.cyml [lib] modules:"
            echo "$MISSING"
            exit 1
          fi
          echo "Manifest covers all main.cyr src/ includes."

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/bote
          echo "bote: $(wc -c < build/bote) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/bote | grep -q "7f45 4c46"

      - name: Run tests
        # Test files split across compilation units (bote.tcyr, plus
        # per-module bote_<mod>.tcyr) to stay under the cyrius
        # function-table cap. Run each in turn; fail fast on any
        # 'N failed' line that isn't '0 failed'.
        run: |
          fail=0
          for tcyr in tests/bote.tcyr \
                      tests/bote_auth.tcyr \
                      tests/bote_content.tcyr \
                      tests/bote_host.tcyr \
                      tests/bote_jwt.tcyr \
                      tests/bote_pkce.tcyr \
                      tests/bote_sandbox.tcyr \
                      tests/bote_libro_tools.tcyr; do
            echo "--- $tcyr ---"
            out=$(cyrius test "$tcyr" 2>&1)
            tail=$(echo "$out" | tail -3)
            echo "$tail"
            if echo "$out" | grep -qE '^[0-9]+ passed, [^0]'; then
              echo "FAIL: $tcyr"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || exit 1

      - name: Build benchmarks (non-fatal)
        run: |
          if [ -f tests/bote.bcyr ]; then
            cyrius build tests/bote.bcyr build/bote_bench || exit 0
            ./build/bote_bench | tee bench-results.txt || exit 0
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bote-${{ github.sha }}
          path: |
            build/bote
            bench-results.txt
          if-no-files-found: warn

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md CLAUDE.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md LICENSE VERSION cyrius.cyml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          CYML_VERSION=$(grep '^version = ' cyrius.cyml | head -1 | sed -E 's/version = "([^"]+)".*/\1/')
          # cyrius.cyml uses ${file:VERSION} — treat the literal as "match"
          if [ "$CYML_VERSION" != '${file:VERSION}' ] && [ "$CYML_VERSION" != "$FILE_VERSION" ]; then
            echo "FAIL: VERSION ($FILE_VERSION) != cyrius.cyml ($CYML_VERSION)"
            exit 1
          fi
          grep -q "\[$FILE_VERSION\]" CHANGELOG.md || { echo "FAIL: version $FILE_VERSION not in CHANGELOG.md"; exit 1; }
          echo "Version consistent: $FILE_VERSION"
